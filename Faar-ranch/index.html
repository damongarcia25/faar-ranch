<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>ForEver After All Ranch — the ranch, in your pocket</title>
<meta name="theme-color" content="#7A5341" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="FAAR Ranch" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%20%22ForEver%20After%20All%20Ranch%22%2C%20%22short_name%22%3A%20%22FAAR%20Ranch%22%2C%20%22start_url%22%3A%20%22./%22%2C%20%22scope%22%3A%20%22./%22%2C%20%22display%22%3A%20%22standalone%22%2C%20%22background_color%22%3A%20%22%23EADFCE%22%2C%20%22theme_color%22%3A%20%22%237A5341%22%2C%20%22orientation%22%3A%20%22portrait%22%2C%20%22icons%22%3A%20%5B%7B%22src%22%3A%20%22icon-192.png%22%2C%20%22sizes%22%3A%20%22192x192%22%2C%20%22type%22%3A%20%22image/png%22%2C%20%22purpose%22%3A%20%22any%22%7D%2C%20%7B%22src%22%3A%20%22icon-512.png%22%2C%20%22sizes%22%3A%20%22512x512%22%2C%20%22type%22%3A%20%22image/png%22%2C%20%22purpose%22%3A%20%22any%22%7D%2C%20%7B%22src%22%3A%20%22icon-512.png%22%2C%20%22sizes%22%3A%20%22512x512%22%2C%20%22type%22%3A%20%22image/png%22%2C%20%22purpose%22%3A%20%22maskable%22%7D%5D%7D" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EADFCE; --surface:#FBF6EE; --surface-2:#F3E9DA;
    --ink:#2E2620; --muted:#8A7869; --line:#E2D4C0;
    --pine:#7A5341; --pine-deep:#5E3F30; --bark:#3A2A20;
    --leather:#B07A70; --leather-deep:#90584F;
    --brass:#C7A267; --brass-lt:#E2C892;
    --rose-soft:#F2DAD3;
    --good:#5E8A5A; --warn:#B07A2A; --bad:#A8492F;
    --shadow:0 1px 2px rgba(46,38,32,.06), 0 8px 24px rgba(46,38,32,.09);
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:Inter,system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 50% -10%, #f6e7df 0%, var(--bg) 55%) fixed,
      repeating-linear-gradient(90deg, rgba(120,84,64,.035) 0 2px, transparent 2px 46px) fixed;
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .display{font-family:"Bricolage Grotesque",system-ui,sans-serif;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  img{max-width:100%;display:block}
  input,textarea{font-family:inherit;font-size:16px}
  :focus-visible{outline:2.5px solid var(--brass);outline-offset:2px;border-radius:6px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ---- phone shell ---- */
  .shell{
    max-width:448px;margin:0 auto;min-height:100dvh;
    background:var(--surface);
    box-shadow:0 0 0 1px var(--line), 0 30px 80px rgba(30,25,18,.18);
    position:relative;overflow:hidden;display:flex;flex-direction:column;
  }
  @media(min-width:480px){ .shell{margin:24px auto;min-height:calc(100dvh - 48px);border-radius:28px} }

  /* ---- top bar ---- */
  .topbar{
    background:var(--bark);color:#EDE6D6;padding:14px 18px;
    display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;
    border-bottom:1px solid rgba(182,138,62,.35);
  }
  .brand{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
  .brand .mark{
    width:30px;height:30px;border-radius:8px;flex:none;
    background:linear-gradient(160deg,var(--brass-lt),var(--brass));
    display:grid;place-items:center;color:var(--bark);
    box-shadow:inset 0 1px 1px rgba(255,255,255,.5), 0 1px 3px rgba(0,0,0,.3);
  }
  .brand b{font-family:"Bricolage Grotesque";font-weight:700;font-size:16px;letter-spacing:.01em;line-height:1}
  .brand small{display:block;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--brass-lt);margin-top:2px}
  .topbar .spacer{flex:1}
  .status-pill{
    display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;
    padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.12);white-space:nowrap;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:#7e8c80}
  .dot.on{background:#7BD389;box-shadow:0 0 0 3px rgba(123,211,137,.25);animation:pulse 2s infinite}
  @keyframes pulse{50%{box-shadow:0 0 0 6px rgba(123,211,137,0)}}
  .ava{width:30px;height:30px;border-radius:9px;object-fit:cover;border:1.5px solid var(--brass);background:var(--pine)}
  .icon-btn{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:#EDE6D6;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);position:relative;flex:none}
  .icon-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8}
  .nbadge{position:absolute;top:-5px;right:-5px;min-width:17px;height:17px;padding:0 3px;border-radius:9px;background:var(--bad);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;border:2px solid var(--bark)}

  /* ---- scroll body ---- */
  .body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .view{padding:18px 16px 8px;animation:rise .35s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .eyebrow{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--leather);font-weight:600;margin:0 0 4px}
  h1.title{font-family:"Bricolage Grotesque";font-weight:700;font-size:25px;margin:0 0 2px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .section-label{display:flex;align-items:center;gap:10px;margin:22px 2px 12px}
  .section-label h2{font-family:"Bricolage Grotesque";font-weight:600;font-size:15px;margin:0}
  .section-label .ln{flex:1;height:1px;background:var(--line)}

  /* ---- nameplate (signature motif) ---- */
  .plate{
    --pl:#C9A75A;
    display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;
    background:linear-gradient(170deg,#d8bd7e,#b78f43 60%,#a07b35);
    color:#2a2113;box-shadow:inset 0 1px 1px rgba(255,255,255,.55), inset 0 -2px 4px rgba(80,55,10,.35), var(--shadow);
    border:1px solid #8a6c2e;position:relative;
  }
  .plate::before{content:"";position:absolute;left:6px;top:6px;width:5px;height:5px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff7df,#7a5d22);box-shadow:0 0 0 1px rgba(0,0,0,.15)}
  .plate::after{content:"";position:absolute;right:6px;top:6px;width:5px;height:5px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff7df,#7a5d22);box-shadow:0 0 0 1px rgba(0,0,0,.15)}
  .plate .pname{font-family:"Bricolage Grotesque";font-weight:700;font-size:15px;letter-spacing:.02em;line-height:1.1}
  .plate .pmeta{font-size:11px;opacity:.8;line-height:1.1;margin-top:1px}
  .plate .photo{width:38px;height:38px;border-radius:7px;object-fit:cover;border:1px solid #8a6c2e;flex:none;background:#2e2a22}

  /* ---- buttons ---- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:12px 16px;border-radius:12px;font-weight:600;font-size:14px;
    background:var(--pine);color:#F4EFE2;box-shadow:var(--shadow);transition:transform .08s, filter .15s;
    width:100%;
  }
  .btn:active{transform:translateY(1px)}
  .btn:hover{filter:brightness(1.06)}
  .btn.leather{background:var(--leather)}
  .btn.ghost{background:transparent;color:var(--pine);border:1.5px solid var(--line);box-shadow:none}
  .btn.brass{background:linear-gradient(160deg,var(--brass-lt),var(--brass));color:#2a2113}
  .btn.sm{padding:8px 12px;font-size:13px;width:auto}
  .btn.danger{background:var(--bad)}
  .btn[disabled]{opacity:.5;pointer-events:none}

  /* ---- check-in ---- */
  .checkin-card{padding:18px;text-align:center;margin-bottom:8px;background:linear-gradient(165deg,#efe4cd,#e6d9bc)}
  .big-toggle{
    width:92px;height:92px;border-radius:50%;margin:4px auto 8px;display:grid;place-items:center;
    background:radial-gradient(circle at 50% 32%, #d35346, #b23529);color:#fff;
    border:2px solid #9c2f25;box-shadow:0 0 0 6px rgba(178,53,41,.13), var(--shadow);transition:.25s;
  }
  .big-toggle .ic{font-size:24px;line-height:1}
  .big-toggle .lbl{font-size:10px;font-weight:700;letter-spacing:.05em;margin-top:3px}
  .big-toggle.on{
    background:radial-gradient(circle at 50% 35%,#946a53,var(--pine));color:#f6ece6;border:2px solid var(--brass);
    box-shadow:0 0 0 6px rgba(51,80,63,.12), var(--shadow);
  }
  .board{display:flex;flex-direction:column;gap:9px}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:18px;border:1px dashed var(--line);border-radius:12px;background:var(--surface-2)}

  /* ---- feed ---- */
  .post{padding:13px 14px;margin-bottom:10px}
  .post .head{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .post .head img{width:32px;height:32px;border-radius:9px;object-fit:cover;background:var(--pine)}
  .post .who{font-weight:600;font-size:13.5px}
  .post .when{font-size:11px;color:var(--muted)}
  .post .txt{font-size:14px;color:#352f27}
  .post .tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    color:var(--leather);background:#f2e6df;padding:2px 7px;border-radius:6px;margin-left:auto}
  .post .acts{display:flex;gap:16px;margin-top:9px;font-size:12px;color:var(--muted);font-weight:600}
  .post .acts button{display:flex;align-items:center;gap:5px;color:var(--muted)}
  .post .acts button.liked{color:var(--leather)}
  .composer{display:flex;gap:8px;align-items:flex-end;margin-bottom:14px}
  .composer textarea{flex:1;border:1px solid var(--line);border-radius:12px;padding:10px 12px;resize:none;
    background:var(--surface);min-height:44px;max-height:120px;font-size:14px;color:var(--ink)}

  /* ---- hire ---- */
  .pro{display:flex;gap:12px;padding:13px;margin-bottom:10px;align-items:center}
  .pro .av{width:46px;height:46px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:22px;
    background:var(--surface-2);border:1px solid var(--line)}
  .pro .nm{font-weight:600;font-size:14px}
  .pro .role{font-size:11.5px;color:var(--leather);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .pro .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .stars{color:var(--brass);font-size:12px;letter-spacing:1px}

  /* ---- shop ---- */
  .shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .prod{padding:0;overflow:hidden;display:flex;flex-direction:column}
  .prod .pic{aspect-ratio:1;background:var(--surface-2);display:grid;place-items:center;border-bottom:1px solid var(--line)}
  .prod .pic svg{width:74%;height:74%}
  .prod .info{padding:9px 10px 11px}
  .prod .pn{font-weight:600;font-size:13px;line-height:1.25}
  .prod .pp{font-family:"Bricolage Grotesque";font-weight:700;font-size:15px;margin-top:2px}
  .prod .add{margin-top:8px;width:100%;padding:7px;font-size:12.5px}
  .brandtag{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--brass);font-weight:600}

  /* ---- rides ---- */
  .ride{padding:14px;margin-bottom:11px;position:relative;overflow:hidden}
  .ride .date{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .ride .cal{width:46px;height:50px;border-radius:10px;background:var(--pine);color:#fff;display:grid;
    place-items:center;text-align:center;flex:none;line-height:1}
  .ride .cal .m{font-size:9px;letter-spacing:.12em;text-transform:uppercase;opacity:.85}
  .ride .cal .d{font-family:"Bricolage Grotesque";font-weight:700;font-size:20px}
  .ride .rn{font-family:"Bricolage Grotesque";font-weight:600;font-size:15px}
  .ride .rmeta{font-size:12px;color:var(--muted);margin-top:1px}
  .chip{display:inline-block;font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:999px;
    background:var(--surface-2);border:1px solid var(--line);color:var(--muted)}
  .chip.easy{color:#2f6b43;background:#e6f0e6;border-color:#cadfca}
  .chip.mod{color:#9a6b1f;background:#f4ecd9;border-color:#e6d6ad}
  .chip.adv{color:#9a3a26;background:#f4e0da;border-color:#e6c4ba}
  .spots{font-size:12px;font-weight:600;margin:9px 0 10px}
  .spots b{color:var(--leather)}

  /* ---- bottom nav ---- */
  .tabs{
    flex:none;width:100%;
    background:rgba(251,248,241,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);
    display:flex;z-index:40;padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  }
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;color:var(--muted);font-size:9.5px;font-weight:600;letter-spacing:.02em}
  .tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7}
  .tab.active{color:var(--pine)}
  .tab.active .ix{background:rgba(122,83,65,.12)}
  .tab .ix{padding:4px 12px;border-radius:999px;transition:.2s}

  /* ---- onboarding ---- */
  .onboard{padding:0;min-height:100dvh;display:flex;flex-direction:column}
  .hero{
    background:linear-gradient(180deg,var(--bark),var(--pine-deep));color:#EDE6D6;
    padding:46px 26px 30px;position:relative;overflow:hidden;
  }
  .hero::after{content:"";position:absolute;inset:0;opacity:.12;
    background:repeating-linear-gradient(115deg,#fff 0 1px,transparent 1px 9px)}
  .hero .mk{width:54px;height:54px;border-radius:15px;background:linear-gradient(160deg,var(--brass-lt),var(--brass));
    display:grid;place-items:center;color:var(--bark);margin-bottom:18px;box-shadow:inset 0 1px 1px rgba(255,255,255,.5)}
  .hero h1{font-family:"Bricolage Grotesque";font-weight:700;font-size:33px;line-height:1.04;margin:0 0 8px;letter-spacing:-.02em;position:relative}
  .hero p{font-size:14.5px;color:#cfc6b2;margin:0;max-width:30ch;position:relative}
  .ob-body{padding:24px 22px 30px;flex:1}
  .photo-drop{
    aspect-ratio:1;border-radius:20px;border:2px dashed var(--line);background:var(--surface-2);
    display:grid;place-items:center;text-align:center;color:var(--muted);overflow:hidden;position:relative;margin-bottom:18px;
  }
  .photo-drop img{width:100%;height:100%;object-fit:cover}
  .photo-drop .ph{display:flex;flex-direction:column;align-items:center;gap:7px;padding:20px}
  .photo-drop .ph .ic{font-size:34px}
  .photo-drop .frame{position:absolute;inset:10px;border:2px solid rgba(182,138,62,.55);border-radius:14px;pointer-events:none}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .field input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:var(--surface);color:var(--ink)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

  /* ---- modal / toast ---- */
  .scrim{position:fixed;inset:0;background:rgba(30,25,18,.5);z-index:60;display:grid;place-items:center;padding:24px;animation:fade .2s}
  @keyframes fade{from{opacity:0}}
  .modal{background:var(--surface);border-radius:20px;padding:22px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:rise .25s}
  .modal h3{font-family:"Bricolage Grotesque";font-weight:700;font-size:19px;margin:0 0 4px}
  .modal p{font-size:13px;color:var(--muted);margin:0 0 16px}
  .modal input{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:12px;background:var(--surface-2)}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:80;
    background:var(--bark);color:#EDE6D6;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:500;
    box-shadow:0 10px 30px rgba(0,0,0,.3);border:1px solid rgba(182,138,62,.4);animation:toastin .3s;max-width:90%}
  @keyframes toastin{from{opacity:0;transform:translate(-50%,12px)}}

  /* ---- owner mode ---- */
  .owner-banner{background:linear-gradient(120deg,var(--leather),var(--leather-deep));color:#fbeee7;
    padding:11px 16px;display:flex;align-items:center;gap:10px;font-size:12.5px;font-weight:600}
  .owner-banner .x{margin-left:auto}
  .stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
  .stat{padding:12px 10px;text-align:center}
  .stat .n{font-family:"Bricolage Grotesque";font-weight:700;font-size:22px;color:var(--pine)}
  .stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
  .horse-card{padding:13px;margin-bottom:12px}
  .horse-card .top{display:flex;align-items:center;gap:11px;margin-bottom:10px}
  .horse-card .stall{font-size:11px;color:var(--muted)}
  .horse-card .bal{margin-left:auto;text-align:right}
  .horse-card .bal .amt{font-family:"Bricolage Grotesque";font-weight:700;font-size:15px}
  .horse-card .bal.due .amt{color:var(--bad)}
  .horse-card .bal.paid .amt{color:var(--good)}
  .med{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:11px;background:var(--surface-2);margin-bottom:7px;border:1px solid var(--line)}
  .med .mn{font-weight:600;font-size:13px}
  .med .md{font-size:11.5px;color:var(--muted)}
  .med .toggle{margin-left:auto;flex:none}
  .switch{width:46px;height:27px;border-radius:999px;background:#cfc6b2;position:relative;transition:.2s;flex:none}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .switch.on{background:var(--good)}
  .switch.on::after{left:22px}
  .note{font-size:12px;color:#4a443a;background:#f6f0e2;border-left:3px solid var(--brass);padding:7px 10px;border-radius:0 8px 8px 0;margin-top:8px}
  .mini-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:10px 0 5px}

  .foot{padding:20px 16px 30px;text-align:center;color:var(--muted);font-size:11px}
  .foot b{cursor:default;color:var(--muted)}
  .cart-fab{position:absolute;right:16px;bottom:84px;z-index:45;width:50px;height:50px;border-radius:16px;
    background:var(--leather);color:#fff;display:grid;place-items:center;box-shadow:var(--shadow)}
  .cart-fab .badge{position:absolute;top:-5px;right:-5px;background:var(--brass);color:#2a2113;font-size:11px;font-weight:700;
    width:21px;height:21px;border-radius:50%;display:grid;place-items:center;border:2px solid var(--surface)}
  /* leopard / operator backdrop */
  .leopard{position:relative;background-color:#d6a85c;background-image:
    radial-gradient(circle at 12% 18%, #7a4f24 0 5px, #34210f 5px 8px, transparent 9px),
    radial-gradient(circle at 38% 30%, #7a4f24 0 6px, #34210f 6px 10px, transparent 11px),
    radial-gradient(circle at 70% 15%, #7a4f24 0 5px, #34210f 5px 8px, transparent 9px),
    radial-gradient(circle at 88% 42%, #7a4f24 0 6px, #34210f 6px 9px, transparent 10px),
    radial-gradient(circle at 22% 62%, #7a4f24 0 6px, #34210f 6px 10px, transparent 11px),
    radial-gradient(circle at 55% 70%, #7a4f24 0 5px, #34210f 5px 8px, transparent 9px),
    radial-gradient(circle at 82% 80%, #7a4f24 0 6px, #34210f 6px 9px, transparent 10px),
    radial-gradient(circle at 45% 92%, #7a4f24 0 5px, #34210f 5px 8px, transparent 9px),

function shade(hex,pct){

}

/* ---------- live weather (Open-Meteo, no key, ranch coords) ---------- */
let weatherCache=null;
function describeWx(code){
  const m={0:["Clear","☀️"],1:["Mainly clear","🌤️"],2:["Partly cloudy","⛅"],3:["Overcast","☁️"],
    45:["Fog","🌫️"],48:["Fog","🌫️"],51:["Light drizzle","🌦️"],53:["Drizzle","🌦️"],55:["Drizzle","🌦️"],
    61:["Light rain","🌧️"],63:["Rain","🌧️"],65:["Heavy rain","🌧️"],66:["Freezing rain","🌧️"],67:["Freezing rain","🌧️"],
    71:["Light snow","🌨️"],73:["Snow","🌨️"],75:["Heavy snow","❄️"],77:["Snow grains","🌨️"],
    80:["Showers","🌦️"],81:["Showers","🌦️"],82:["Heavy showers","⛈️"],85:["Snow showers","🌨️"],86:["Snow showers","🌨️"],
    95:["Thunderstorm","⛈️"],96:["Thunderstorm","⛈️"],99:["Thunderstorm","⛈️"]};
  return m[code]||["—","🌤️"];
}
function applyWx(d){
  const t=$("#wxTemp"),i=$("#wxIcon"),de=$("#wxDesc"); if(!t)return;
  const [desc,emo]=describeWx(d.code);
  t.textContent=`${Math.round(d.temp)}°F · ${desc}`;
  i.textContent=emo;
  de.textContent=`Marana / Tucson, AZ · wind ${Math.round(d.wind)} mph`;
}
function loadWeather(){
  if(weatherCache && Date.now()-weatherCache.t<1800000){ applyWx(weatherCache); return; }
  fetch("https://api.open-meteo.com/v1/forecast?latitude=32.4&longitude=-111.12&current=temperature_2m,wind_speed_10m,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FPhoenix")
    .then(r=>r.json())
    .then(j=>{ const c=j.current; weatherCache={temp:c.temperature_2m,wind:c.wind_speed_10m,code:c.weather_code,t:Date.now()}; applyWx(weatherCache); })
    .catch(()=>{ const t=$("#wxTemp"),de=$("#wxDesc"); if(t){t.textContent="Weather unavailable";if(de)de.textContent="Marana / Tucson, AZ";} });
}
function announcementCard(a){
  return `<div class="card" style="padding:13px;margin-bottom:10px;border-left:3px solid var(--brass)">

    case "tee": return wrap(`<path d="M34 28 L24 38 L30 46 L34 42 L34 74 L66 74 L66 42 L70 46 L76 38 L66 28 Q50 38 34 28" fill="${B}"/><text x="50" y="58" font-family="Bricolage Grotesque,sans-serif" font-size="11" font-weight="700" fill="${D}" text-anchor="middle">FAAR</text>`);
    case "hoodie": return wrap(`<path d="M30 30 L24 40 L30 46 L33 43 L33 76 L67 76 L67 43 L70 46 L76 40 L70 30 Q61 25 58 26 L42 26 Q39 25 30 30Z" fill="${P}"/><path d="M42 26 Q50 35 58 26 Q54 31 50 31 Q46 31 42 26Z" fill="${D}" opacity=".5"/><rect x="40" y="58" width="20" height="13" rx="3" fill="${D}" opacity=".22"/><path d="M47 31 l-1 11 M53 31 l1 11" stroke="${B}" stroke-width="2" stroke-linecap="round"/><text x="50" y="52" font-family="Bricolage Grotesque,sans-serif" font-size="9" font-weight="700" fill="${C}" text-anchor="middle">FAAR</text>`);
    case "trucker": return wrap(`<path d="M22 56 Q50 26 78 56 Z" fill="${P}"/><path d="M22 56 L78 56 L78 62 Q50 70 22 62 Z" fill="${P}"/><path d="M22 56 Q50 30 64 46 L40 56 Z" fill="${C}"/><path d="M30 50 l0 6 M36 47 l0 9 M42 45 l0 11 M48 45 l0 11" stroke="${P}" stroke-width="1.3" opacity=".4"/><circle cx="40" cy="49" r="3" fill="${B}"/>`);

/* ---------- RIDES ---------- */
function viewRides(){
  return `<div class="view">
    <p class="eyebrow">Saddle up</p>
    <h1 class="title">Group rides</h1>
    <p class="sub">Tap a ride to reserve your spot and join the ride chat. Open to all boarders — beginners welcome on easy trails.</p>
    ${RIDES.map(r=>{
      const joined=S.joined[r.id]; const taken=r.taken+(joined?1:0); const left=r.cap-taken;
      const dl={easy:'easy',mod:'moderate',adv:'advanced'}[r.diff];
      const chatCount=(S.rideChats[r.id]||[]).length;
      return `<button class="card ride rideCard" data-id="${r.id}" style="width:100%;text-align:left;display:block">
        <div class="date">
          <div class="cal"><div class="m">${r.m}</div><div class="d">${r.d}</div></div>
          <div style="flex:1"><div class="rn">${r.nm}</div><div class="rmeta">${r.time} · ${r.guide}</div></div>
          <span class="chip ${r.diff}">${dl}</span>
        </div>
        <div class="spots">${left>0?`<b>${left} spot${left>1?'s':''}</b> left of ${r.cap}`:`<b>Full</b> — waitlist`}${joined?` · <span style="color:var(--good)">✓ Signed up!</span>`:''}</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--leather);font-weight:600;margin-top:2px">💬 ${chatCount?chatCount+' messages':'Open ride chat'}<span style="margin-left:auto;color:var(--muted);font-size:18px;font-weight:700">›</span></div>
      </button>`;
    }).join("")}
  </div>`;
}
function bindRides(){
  shell.querySelectorAll(".rideCard").forEach(b=>b.onclick=()=>{ S.rideOpen=Number(b.dataset.id); S.view="ride"; renderApp(); });
}
function chatBubble(m){
  return `<div class="card" style="padding:10px 12px;margin-bottom:8px;display:flex;gap:9px;align-items:flex-start">
    ${avatar(null,m.color,m.who,30)}
    <div style="flex:1"><div style="font-size:12.5px"><b>${m.who}</b> <span style="color:var(--muted);font-size:11px">· ${m.when}</span></div>
    <div style="font-size:13.5px;color:#352f27;margin-top:1px">${escapeHtml(m.txt)}</div></div>
  </div>`;
}
function viewRide(){
  const r=RIDES.find(x=>x.id===S.rideOpen);
  if(!r){ S.view="rides"; return viewRides(); }
  const joined=S.joined[r.id]; const taken=r.taken+(joined?1:0); const left=r.cap-taken;
  const dl={easy:'easy',mod:'moderate',adv:'advanced'}[r.diff];
  const msgs=S.rideChats[r.id]||[];
  return `<div class="view">
    <button class="back-btn" id="rdBack">‹ All rides</button>
    <div class="card" style="padding:14px;margin-bottom:14px">
      <div class="date">
        <div class="cal"><div class="m">${r.m}</div><div class="d">${r.d}</div></div>
        <div style="flex:1"><div class="rn">${r.nm}</div><div class="rmeta">${r.time} · ${r.guide}</div></div>
        <span class="chip ${r.diff}">${dl}</span>
      </div>
      <div class="spots" style="margin:9px 0 10px">${left>0?`<b>${left} spot${left>1?'s':''}</b> left of ${r.cap}`:`<b>Full</b> — join the waitlist`}</div>
      <button class="btn ${joined?'ghost':''}" id="rdJoin">${joined?"✓ Signed up! — cancel":(left>0?'Reserve my spot':'Join waitlist')}</button>
    </div>

    <div class="section-label"><h2>Ride chat</h2><span class="ln"></span></div>
    <p class="sub" style="margin-top:-4px">Ask the group anything about this ride — meeting spot, pace, what to bring.</p>
    <div id="rideMsgs">
      ${msgs.length? msgs.map(m=>chatBubble(m)).join("") : `<div class="empty">No messages yet. Say hi 👋</div>`}
    </div>
    <div class="reply-box" style="margin-top:12px"><input id="rideInput" placeholder="Message the group…" autocomplete="off" autocapitalize="sentences" enterkeyhint="send"><button class="btn brass sm" id="rideSend" style="padding:10px 14px">Send</button></div>
    <div style="height:14px"></div>
  </div>`;
}
function bindRide(){
  const back=$("#rdBack"); if(back)back.onclick=()=>{ S.view="rides"; renderApp(); };
  const j=$("#rdJoin"); if(j)j.onclick=()=>{
    const r=RIDES.find(x=>x.id===S.rideOpen); S.joined[r.id]=!S.joined[r.id];
    toast(S.joined[r.id]?"Signed up! 🐎":"Reservation cancelled"); renderView();
  };
  const send=()=>{
    const inp=$("#rideInput"), v=(inp&&inp.value.trim())||""; if(!v)return;
    if(!S.rideChats[S.rideOpen])S.rideChats[S.rideOpen]=[];
    S.rideChats[S.rideOpen].push({who:userLabel(),color:pHorse().color,txt:v,when:"now"});
    save(); renderView();
    const bd=$("#body"); if(bd) requestAnimationFrame(()=>{ bd.scrollTop=bd.scrollHeight; });
  };
  const sb=$("#rideSend"); if(sb)sb.onclick=send;
  const inp=$("#rideInput"); if(inp)inp.onkeydown=e=>{ if(e.key==="Enter")send(); };
}

/* ---------- NOTIFICATIONS ---------- */
function randomPerson(){ return SIMPLE_PEOPLE[Math.floor(Math.random()*SIMPLE_PEOPLE.length)]; }
function addNotif(type,p,text){
  S.notifs.unshift({id:Date.now(),type,who:p.who,color:p.color,text,when:"now",read:false});
  save(); updateBell();
}
function updateBell(){
  const b=$("#bellBadge"); if(!b)return;
  const n=S.notifs.filter(x=>!x.read).length;
  b.textContent=n; b.style.display=n?"grid":"none";
}
function niceType(t){ return t==="reply"?"Reply":t==="commentlike"?"Comment like":"Like"; }
function openNotifs(){ S.notifs.forEach(n=>n.read=true); save(); S.view="notifs"; renderApp(); }
function viewNotifs(){
  return `<div class="view">
    <button class="back-btn" id="ntBack">‹ Back to feed</button>
    <p class="eyebrow">Activity</p>
    <h1 class="title">Notifications</h1>
    <p class="sub">When someone likes or replies to your posts and comments, it shows up here.</p>
    ${S.notifs.length? S.notifs.map(n=>`
      <div class="card notifRow" style="padding:11px 13px;margin-bottom:9px;display:flex;align-items:center;gap:11px">

        <div style="font-size:11px;color:var(--muted);margin-top:1px">${niceType(n.type)} · ${n.when}</div></div>
        <span style="font-size:16px">${n.type==='reply'?'💬':'♥'}</span>
      </div>`).join("") : `<div class="empty">No notifications yet.</div>`}

}
function bindNotifs(){
  const back=$("#ntBack"); if(back)back.onclick=()=>{ S.view="feed"; renderApp(); };
  shell.querySelectorAll(".notifRow").forEach(b=>b.onclick=()=>{ S.view="feed"; renderApp(); });
}


/* =====================  PROFILE  ===================== */
function openProfile(){
  S.prof={ nick:dispName(), photo:S.user.photo, showHorse:!!S.user.showHorse,
    horses:(S.user.horses||[{name:S.user.horse||"",color:S.user.color||"#7A5341"}]).map(h=>({...h})) };
  S.view="profile"; renderApp();
}
function syncProfileInputs(){
  const n=$("#pfNick"); if(n)S.prof.nick=n.value;
  shell.querySelectorAll(".hname").forEach(inp=>{ const i=+inp.dataset.i; if(S.prof.horses[i])S.prof.horses[i].name=inp.value; });
}
function viewProfile(){
  const p=S.prof, primary=p.horses[0]||{color:"#7A5341"};
  const previewLabel = p.showHorse ? (p.horses[0]&&p.horses[0].name?p.horses[0].name:"Your horse") : (p.nick||"You");
  return `<div class="view">
    <button class="back-btn" id="pfBack">‹ Back to the ranch</button>
    <p class="eyebrow">Your profile</p>
    <h1 class="title">${escapeHtml(p.nick||"You")}</h1>
    <p class="sub">Change your nickname and photo, manage your horses, and choose what others see.</p>

    <div class="card" style="padding:15px;margin-bottom:16px;display:flex;gap:13px;align-items:center;background:linear-gradient(165deg,#efe4cd,#e6d9bc)">
      ${horse3D(primary.color,52)}
      <div style="flex:1"><div style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600">On the board, others see</div>
      <div style="display:flex;align-items:center;gap:7px;margin-top:4px"><b style="font-family:'Bricolage Grotesque';font-size:18px">${escapeHtml(previewLabel)}</b></div></div>
    </div>

    <div class="field"><label>Nickname</label><input id="pfNick" value="${escapeAttr(p.nick)}" placeholder="What should everyone call you?" autocapitalize="words" autocorrect="off" spellcheck="false" enterkeyhint="done"></div>
    <button class="btn ghost sm" id="pfPhotoBtn" style="margin-bottom:4px">Change photo</button>
    <input id="pfPhoto" type="file" accept="image/*" capture="environment" class="hidden">

    <div class="section-label"><h2>Privacy</h2><span class="ln"></span></div>
    <div class="card" style="padding:13px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1"><div style="font-weight:600;font-size:13.5px">Show my horse's name, not mine</div>
        <div style="font-size:12px;color:var(--muted)">On the property board and feed, others see your horse's name instead of your name. Ranch staff always see your real name.</div></div>
        <button class="switch ${p.showHorse?'on':''}" id="privSwitch" aria-label="toggle privacy"></button>
      </div>
    </div>

    <div class="section-label"><h2>Your horses</h2><span class="ln"></span><span style="font-size:12px;color:var(--muted);font-weight:600">${p.horses.length}</span></div>
    ${p.horses.map((h,i)=>`
      <div class="card hcard">
        <div class="hrow">
          ${horse3D(h.color,34)}
          <input class="hname" data-i="${i}" value="${escapeAttr(h.name)}" placeholder="Horse's name" autocapitalize="words" autocorrect="off" spellcheck="false" enterkeyhint="done">
          ${p.horses.length>1?`<button class="xbtn rmHorse" data-i="${i}" aria-label="remove horse">✕</button>`:""}
        </div>
        <div>
          <div style="font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em">Coat color</div>
          <div class="swatches">${HCOLORS.map(c=>`<button class="swatch ${c.toLowerCase()===(h.color||"").toLowerCase()?'sel':''}" data-i="${i}" data-c="${c}" style="${swatchStyle(c)}" aria-label="${c[0]==='#'?'pick color':c+' coat'}"></button>`).join("")}</div>
        </div>
      </div>`).join("")}
    <button class="btn ghost" id="addHorse" style="margin-bottom:16px">+ Add another horse</button>

    <button class="btn" id="pfSave">Save profile</button>
    <div style="height:24px"></div>
  </div>`;
}
function bindProfile(){
  $("#pfBack").onclick=()=>{ S.view="barn"; renderApp(); };
  const pb=$("#pfPhotoBtn"), pi=$("#pfPhoto");
  if(pb)pb.onclick=()=>pi.click();
  if(pi)pi.onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
    r.onload=ev=>{ syncProfileInputs(); S.prof.photo=ev.target.result; renderView(); }; r.readAsDataURL(f); };
  shell.querySelectorAll(".swatch").forEach(sw=>sw.onclick=()=>{ syncProfileInputs(); S.prof.horses[+sw.dataset.i].color=sw.dataset.c; renderView(); });
  shell.querySelectorAll(".rmHorse").forEach(b=>b.onclick=()=>{ syncProfileInputs(); S.prof.horses.splice(+b.dataset.i,1); renderView(); });
  const ah=$("#addHorse"); if(ah)ah.onclick=()=>{ syncProfileInputs(); S.prof.horses.push({name:"",color:"#A6764E"}); renderView(); };
  const ps=$("#privSwitch"); if(ps)ps.onclick=()=>{ syncProfileInputs(); S.prof.showHorse=!S.prof.showHorse; renderView(); };
  $("#pfSave").onclick=()=>{
    syncProfileInputs();
    const horses=S.prof.horses.map(h=>({name:(h.name||"").trim(),color:h.color})).filter(h=>h.name);
    if(!horses.length){ toast("Add at least one horse"); return; }
    S.user.nick=(S.prof.nick||"").trim()||S.user.name;
    S.user.photo=S.prof.photo;
    S.user.showHorse=!!S.prof.showHorse;
    S.user.horses=horses;
    S.user.horse=horses[0].name;
    S.user.color=horses[0].color;
    save(); S.view="barn"; renderApp(); toast("Profile saved 🐴");
  };
}

/* =====================  OWNER MODE  ===================== */
function askOwner(){
  const scrim=document.createElement("div"); scrim.className="scrim"; scrim.id="scrim";
  scrim.innerHTML=`<div class="modal">
    <h3>Operator access</h3>
    <p>Private — Bryanna & staff only. Enter your 4-digit PIN.</p>
    <input id="pw" type="password" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off" style="letter-spacing:.6em;text-align:center;font-size:22px">
    <div style="display:flex;gap:9px">
      <button class="btn ghost" id="pwCancel" style="flex:1">Cancel</button>
      <button class="btn leather" id="pwGo" style="flex:1">Unlock</button>
    </div>
  </div>`;
  document.body.appendChild(scrim);
  $("#pw").focus();
  const close=()=>scrim.remove();
  scrim.onclick=e=>{if(e.target===scrim)close();};
  $("#pwCancel").onclick=close;
  const go=()=>{ if($("#pw").value===S.pin){ close(); S.owner=true; render(); toast("Operator unlocked 🔑"); } else { toast("Wrong PIN"); $("#pw").value=""; } };
  $("#pwGo").onclick=go;
  $("#pw").onkeydown=e=>{if(e.key==="Enter")go();};
}
function fmtTime(t){ if(!t)return ""; const p=t.split(":"); let H=+p[0]; const M=p[1]; const ap=H<12?"AM":"PM"; let h=H%12; if(h===0)h=12; return h+":"+M+" "+ap; }
function timeToMin(t){ if(!t)return 0; const p=t.split(":"); return (+p[0])*60+(+p[1]); }
function todayLabel(){ try{ return new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); }catch(e){ return "Today"; } }
function confirmModal(title,msg,yesLabel,onYes){
  const scrim=document.createElement("div"); scrim.className="scrim";
  scrim.innerHTML=`<div class="modal"><h3>${title}</h3><p>${msg}</p>
    <div style="display:flex;gap:9px"><button class="btn ghost" id="cmNo" style="flex:1">Cancel</button>
    <button class="btn leather" id="cmYes" style="flex:1">${yesLabel||"Confirm"}</button></div></div>`;
  document.body.appendChild(scrim);
  const close=()=>scrim.remove();
  scrim.onclick=e=>{ if(e.target===scrim)close(); };
  $("#cmNo").onclick=close;
  $("#cmYes").onclick=()=>{ close(); onYes(); };
}
function opTop(){
  return `<div class="topbar">
    <div class="brand"><div class="mark" style="background:linear-gradient(160deg,#caa05a,var(--leather))">🔑</div>
      <div><b>Ranch Office</b><small>Owner dashboard</small></div></div>
    <div class="spacer"></div>
    <button class="btn ghost sm" id="exitOwner" style="color:#EDE6D6;border-color:rgba(255,255,255,.25)">Exit</button>
  </div>
  <div class="owner-banner">🔒 Private — Bryanna & staff only<span class="x"></span></div>`;
}
function renderOwner(){
  if(S.ownerHorse!=null){ renderHorseDetail(S.ownerHorse); return; }
  const due=S.horses.filter(h=>h.balance>0).reduce((a,h)=>a+h.balance,0);
  const medsLeft=S.horses.reduce((a,h)=>a+h.meds.filter(m=>!m.given).length,0);
  const inPasture=S.horses.filter(h=>h.location==='pasture').length;
  const onProp=(S.checkedIn?[{full:S.user.name,contact:S.user.contact||"—",horse:pHorse().name,color:pHorse().color,me:true}]:[])
    .concat(S.board.map(b=>({full:b.full||b.name,contact:b.contact||"—",horse:b.horse,color:b.color})));
  const tab=S.opTab;

  const medItems=[];
  S.horses.forEach((h,hi)=>h.meds.forEach((m,mi)=>medItems.push({hi,mi,horse:h.name,color:h.color,n:m.n,dose:m.dose,time:m.time||"07:00",given:m.given})));
  medItems.sort((a,b)=>(timeToMin(a.time)-timeToMin(b.time)) || a.horse.localeCompare(b.horse));
  const medDone=medItems.filter(i=>i.given).length;

  const today = `
      <div style="margin-bottom:14px"><div style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--leather);font-weight:600">Today</div>
      <div style="font-family:'Bricolage Grotesque';font-weight:700;font-size:22px;letter-spacing:-.01em">${todayLabel()}</div></div>
      <div class="stat-row">
        <div class="card stat"><div class="n">${S.horses.length}</div><div class="l">Horses</div></div>
        <div class="card stat"><div class="n">${medItems.length-medDone}</div><div class="l">Meds left</div></div>
        <div class="card stat"><div class="n">${onProp.length}</div><div class="l">Here now</div></div>
      </div>

      <div class="section-label"><h2>Today's meds</h2><span class="ln"></span><span style="font-size:12px;color:var(--muted);font-weight:600">${medDone}/${medItems.length} done</span></div>
      ${medItems.length? medItems.map(it=>`
        <div class="card medrow ${it.given?'done':''}" style="padding:10px 11px;margin-bottom:8px;display:flex;align-items:center;gap:9px">
          <input class="todTime" type="time" data-hi="${it.hi}" data-mi="${it.mi}" value="${it.time}">
          ${horse3D(it.color,30)}
          <div style="flex:1;min-width:0"><div class="mn2" style="font-weight:600;font-size:13.5px">${escapeHtml(it.n)} <span style="color:var(--muted);font-weight:400">· ${escapeHtml(it.horse)}</span></div>
          <div style="font-size:11.5px;color:var(--muted)">${escapeHtml(it.dose)}</div></div>
          <button class="todCheck ${it.given?'on':''}" data-hi="${it.hi}" data-mi="${it.mi}" aria-label="mark done">${it.given?'✓':''}</button>
        </div>`).join("") : `<div class="empty">No medications scheduled. Add them on a horse's page.</div>`}

      <div class="section-label"><h2>On the property now</h2><span class="ln"></span><span style="font-size:12px;color:var(--muted);font-weight:600">${onProp.length}</span></div>
      ${onProp.length? onProp.map(m=>`
        <div class="card" style="padding:11px;margin-bottom:9px;display:flex;align-items:center;gap:11px">
          ${horse3D(m.color,34)}
          <div style="flex:1"><div style="font-weight:600;font-size:14px">${escapeHtml(m.full)}${m.me?' · you':''}</div>
          <div style="font-size:12px;color:var(--muted)">${escapeHtml(m.horse)} · ${escapeHtml(m.contact)}</div></div>
        </div>`).join("") : `<div class="empty">Nobody's checked in right now.</div>`}`;

  const horses = (()=>{
    let rows=S.horses.map((h,hi)=>({h,hi}));
    if(S.rosterSort){ rows=rows.slice().sort((a,b)=>{
      const ag=a.h.location===S.rosterSort?0:1, bg=b.h.location===S.rosterSort?0:1;
      if(ag!==bg) return ag-bg;
      return a.h.name.localeCompare(b.h.name);
    }); }
    return `
      <div class="section-label"><h2>Horse roster</h2><span class="ln"></span><span style="font-size:12px;color:var(--muted);font-weight:600">${S.horses.length}</span></div>
      <div class="rsort">
        <button class="${!S.rosterSort?'on':''}" data-sort="">Default</button>
        <button class="${S.rosterSort==='pasture'?'on':''}" data-sort="pasture">🌿 Pasture first</button>
        <button class="${S.rosterSort==='stall'?'on':''}" data-sort="stall">🏠 Stall first</button>
      </div>
      ${rows.map(({h,hi})=>`
        <button class="card horseRow" data-h="${hi}" style="width:100%;text-align:left;padding:11px;margin-bottom:9px;display:flex;align-items:center;gap:11px">
          ${horse3D(h.color,38)}
          <div style="flex:1"><div style="font-weight:600;font-size:14.5px">${h.name}</div>
          <div style="font-size:12px;color:var(--muted)">${h.location==='pasture'?h.pasture:h.stall} · ${escapeHtml(h.owner)}</div></div>
          <span class="chip ${h.location==='pasture'?'easy':''}">${h.location==='pasture'?'🌿 Pasture':'🏠 Stall'}</span>
          <span style="color:var(--muted);font-size:18px;font-weight:700">›</span>
        </button>`).join("")}
      <p style="font-size:11px;color:var(--muted);text-align:center;margin:6px 0 0">Tap a horse for owner info, meds, and to set its stall or pasture.</p>`;
  })();

  const announce = `
      <div class="section-label"><h2>Post an announcement</h2><span class="ln"></span></div>
      <div class="card" style="padding:13px;margin-bottom:11px">
        <textarea id="annBox" placeholder="Share a new update with everyone at the ranch…" style="width:100%;border:1px solid var(--line);border-radius:11px;padding:10px;resize:none;min-height:60px;background:var(--surface-2);font-size:16px;color:var(--ink)"></textarea>
        <button class="btn leather sm" id="annPost" style="margin-top:8px;width:100%">Post announcement</button>
      </div>
      <div class="section-label"><h2>Posted</h2><span class="ln"></span><span style="font-size:12px;color:var(--muted);font-weight:600">${S.announcements.length}</span></div>
      ${S.announcements.length? S.announcements.map(a=> S.editAnn===a.id ? `
        <div class="card" style="padding:12px;margin-bottom:9px">
          <textarea class="annEdit" data-id="${a.id}" style="width:100%;border:1px solid var(--line);border-radius:10px;padding:9px;resize:vertical;min-height:62px;background:var(--surface-2);font-size:16px;color:var(--ink)">${escapeHtml(a.txt)}</textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn ghost sm annCancel" style="flex:1">Cancel</button>
            <button class="btn leather sm annSave" data-id="${a.id}" style="flex:1">Save changes</button>
          </div>
        </div>` : `
        <div class="card" style="padding:12px;margin-bottom:9px;border-left:3px solid var(--brass)">
          <div style="font-size:13.5px;color:#352f27">${escapeHtml(a.txt)}</div>
          <div style="display:flex;align-items:center;margin-top:9px;gap:9px">
            <span style="font-size:11px;color:var(--muted)">📣 ${a.by} · ${a.when}</span>
            <button class="btn ghost sm annEditBtn" data-id="${a.id}" style="margin-left:auto;padding:5px 12px">Edit</button>
            <button class="btn sm annDel" data-id="${a.id}" style="background:var(--bad);padding:5px 12px">Delete</button>
          </div>
        </div>`).join("") : `<div class="empty">No announcements up right now.</div>`}`;

  const security = `
      <div class="section-label"><h2>Ranch summary</h2><span class="ln"></span></div>
      <div class="stat-row" style="margin-bottom:12px">
        <div class="card stat"><div class="n">${S.horses.length-inPasture}</div><div class="l">In stalls</div></div>
        <div class="card stat"><div class="n">${inPasture}</div><div class="l">In pasture</div></div>
        <div class="card stat"><div class="n">$${due}</div><div class="l">Balance due</div></div>
      </div>
      <div class="section-label"><h2>Change PIN</h2><span class="ln"></span></div>
      <div class="card" style="padding:13px;margin-bottom:6px">
        <div style="font-size:13px;color:var(--muted);margin-bottom:9px">Change the operator PIN used to open this office.</div>
        <input id="pinNew" type="password" inputmode="numeric" maxlength="4" placeholder="New 4-digit PIN" style="width:100%;padding:11px;border:1px solid var(--line);border-radius:11px;background:var(--surface-2);margin-bottom:8px;letter-spacing:.5em;text-align:center;font-size:18px;color:var(--ink)">
        <input id="pinNew2" type="password" inputmode="numeric" maxlength="4" placeholder="Confirm new PIN" style="width:100%;padding:11px;border:1px solid var(--line);border-radius:11px;background:var(--surface-2);margin-bottom:10px;letter-spacing:.5em;text-align:center;font-size:18px;color:var(--ink)">
        <button class="btn leather sm" id="pinSave" style="width:100%">Update PIN</button>
      </div>`;

  const content = tab==="horses"?horses : tab==="announce"?announce : tab==="security"?security : today;

  shell.innerHTML=`
  ${opTop()}
  <div class="body leopard">
   <div class="op-sheet">
    <div class="view">
      <div class="optabs">
        <button class="optab ${tab==='today'?'on':''}" data-ot="today">Today</button>
        <button class="optab ${tab==='horses'?'on':''}" data-ot="horses">Horses</button>
        <button class="optab ${tab==='announce'?'on':''}" data-ot="announce">Posts</button>
        <button class="optab ${tab==='security'?'on':''}" data-ot="security">Settings</button>
      </div>
      ${content}
      <div class="foot"><b>ForEver After All Ranch · Office build v0.1</b></div>
    </div>
   </div>
  </div>`;
  $("#exitOwner").onclick=()=>{S.owner=false;S.ownerHorse=null;render();};
  shell.querySelectorAll(".optab").forEach(b=>b.onclick=()=>{ S.opTab=b.dataset.ot; S.editAnn=null; renderOwner(); });
  const ap=$("#annPost"); if(ap)ap.onclick=()=>{
    const v=$("#annBox").value.trim(); if(!v){toast("Write something first");return;}
    S.announcements.unshift({id:Date.now(),txt:v,when:"Just now",by:"Bryanna"});
    save(); renderOwner(); toast("Announcement posted 📣");
  };
  shell.querySelectorAll(".annEditBtn").forEach(b=>b.onclick=()=>{ S.editAnn=Number(b.dataset.id); renderOwner(); });
  shell.querySelectorAll(".annCancel").forEach(b=>b.onclick=()=>{ S.editAnn=null; renderOwner(); });
  shell.querySelectorAll(".annSave").forEach(b=>b.onclick=()=>{
    const id=Number(b.dataset.id), ta=shell.querySelector('.annEdit[data-id="'+id+'"]'), v=ta.value.trim();
    if(!v){ toast("Announcement can't be empty"); return; }
    const a=S.announcements.find(x=>x.id===id); a.txt=v; a.when="Edited just now"; S.editAnn=null; save(); renderOwner(); toast("Announcement updated");
  });
  shell.querySelectorAll(".annDel").forEach(b=>b.onclick=()=>{
    const id=Number(b.dataset.id);
    confirmModal("Delete this announcement?","It will be removed for everyone at the ranch.","Delete",()=>{
      S.announcements=S.announcements.filter(x=>x.id!==id); save(); renderOwner(); toast("Announcement deleted");
    });
  });
  shell.querySelectorAll(".horseRow").forEach(b=>b.onclick=()=>{ S.ownerHorse=Number(b.dataset.h); renderOwner(); });
  shell.querySelectorAll(".rsort button").forEach(b=>b.onclick=()=>{ S.rosterSort=b.dataset.sort||null; renderOwner(); });
  shell.querySelectorAll(".todCheck").forEach(b=>b.onclick=()=>{
    const h=S.horses[+b.dataset.hi], m=h.meds[+b.dataset.mi];
    m.given=!m.given; save(); renderOwner();
    toast(m.given?`${m.n} done ✓`:`${m.n} un-checked`);
  });
  shell.querySelectorAll(".todTime").forEach(inp=>inp.onchange=()=>{
    const h=S.horses[+inp.dataset.hi], m=h.meds[+inp.dataset.mi];
    m.time=inp.value||"07:00"; save(); renderOwner();
  });
  const psv=$("#pinSave"); if(psv)psv.onclick=()=>{
    const a=$("#pinNew").value, b=$("#pinNew2").value;
    if(!/^\d{4}$/.test(a)){ toast("PIN must be 4 digits"); return; }
    if(a!==b){ toast("PINs don't match"); return; }
    S.pin=a; store.set("ch_pin",a); $("#pinNew").value=""; $("#pinNew2").value=""; toast("Operator PIN updated 🔑");
  };
}
function renderHorseDetail(hi){
  const h=S.horses[hi];
  const spot = h.location==='pasture' ? h.pasture : h.stall;
  const stallGrid = `<div class="stallgrid">${STALLS.map(s=>{
      const occ=S.horses.findIndex(x=>x.location==='stall' && x.stall===s);
      const mine=(occ===hi), taken=(occ>=0 && occ!==hi);
      return `<button class="stallcell ${mine?'mine':''} ${taken?'taken':''}" data-stall="${s}" ${taken?'disabled':''}>
        <div class="sn">${s.replace('Stall ','#')}</div>
        <div class="so">${mine?'this horse':taken?S.horses[occ].name:'open'}</div>
      </button>`;
    }).join("")}</div>`;
  const pastureList = PASTURES.map(p=>{
      const count=S.horses.filter(x=>x.location==='pasture' && x.pasture===p).length;
      const mine=(h.location==='pasture' && h.pasture===p);
      const full=(count>=PASTURE_CAP && !mine);
      return `<button class="pastrow ${mine?'mine':''}" data-pasture="${p}" ${full?'disabled':''}>
        <span>🌿 ${p}</span><span class="cnt">${count}/${PASTURE_CAP}${mine?' · here':full?' · full':''}</span>
      </button>`;
    }).join("");
  shell.innerHTML=`
  ${opTop()}
  <div class="body leopard">
   <div class="op-sheet">
    <div class="view">
      <button class="back-btn" id="hdBack">‹ Back to roster</button>
      <div class="card" style="padding:15px;margin-bottom:14px;display:flex;gap:13px;align-items:center">
        ${horse3D(h.color,58)}
        <div><div style="font-family:'Bricolage Grotesque';font-weight:700;font-size:22px">${h.name}</div>
        <div style="font-size:12px;color:var(--muted)">${spot} · ${h.plan}</div></div>
      </div>

      <div class="mini-label">Owner</div>
      <div class="card" style="padding:13px;margin-bottom:14px">
        <div style="font-weight:600;font-size:14px">${escapeHtml(h.owner)}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">${escapeHtml(h.contact)}</div>
        <div style="display:flex;align-items:center;margin-top:10px"><span class="chip">${h.plan}</span>
        <div class="bal ${h.balance>0?'due':'paid'}" style="margin-left:auto"><div class="amt">${h.balance>0?'$'+h.balance+' due':'Paid up'}</div></div></div>
      </div>

      <div class="mini-label">Location</div>
      <div class="card" style="padding:13px;margin-bottom:14px">
        <div class="seg">
          <button class="segbtn ${h.location==='stall'?'on':''}" id="catStall">🏠 Stall</button>
          <button class="segbtn ${h.location==='pasture'?'on':''}" id="catPasture">🌿 Pasture</button>
        </div>
        <div style="font-size:12px;color:var(--muted);margin:2px 0 9px">Currently in <b style="color:var(--ink)">${spot}</b>. ${h.location==='stall'?'Pick a stall:':'Pick a pasture:'}</div>
        ${h.location==='stall' ? stallGrid : pastureList}
      </div>

      <div class="mini-label">Medications</div>
      ${h.meds.map((m,mi)=> (S.medEdit&&S.medEdit.hi===hi&&S.medEdit.mi===mi)
        ? `<div class="card" style="padding:12px;margin-bottom:8px">
             <input class="medfield medN" value="${escapeAttr(m.n)}" placeholder="Medication name" autocapitalize="words" autocorrect="off" spellcheck="false" enterkeyhint="next">
             <input class="medfield medD" value="${escapeAttr(m.dose)}" placeholder="Dose (e.g. 1 tab)" autocapitalize="sentences" enterkeyhint="done">
             <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px"><span style="font-size:12px;color:var(--muted);font-weight:600">Time</span>
               <input class="medfield medT" type="time" value="${m.time||'07:00'}" style="margin:0;flex:1"></div>
             <div style="display:flex;gap:8px">
               <button class="btn ghost sm medCancel" style="flex:1">Cancel</button>
               <button class="btn sm medDel" data-mi="${mi}" style="background:var(--bad)">Delete</button>
               <button class="btn leather sm medSave" data-mi="${mi}" style="flex:1">Save</button>
             </div>
           </div>`
        : `<div class="med"><div style="flex:1"><div class="mn">${escapeHtml(m.n)}</div><div class="md">${escapeHtml(m.dose)} · ${fmtTime(m.time)}</div></div>
             <button class="btn ghost sm medEditBtn" data-mi="${mi}" style="padding:5px 11px;margin-right:8px">Edit</button>
             <button class="toggle switch ${m.given?'on':''}" data-m="${mi}" aria-label="mark given"></button></div>`).join("")}
      ${(S.medEdit&&S.medEdit.hi===hi&&S.medEdit.mi===-1)
        ? `<div class="card" style="padding:12px;margin-bottom:8px">
             <input class="medfield medN" value="" placeholder="Medication name" autocapitalize="words" autocorrect="off" spellcheck="false" enterkeyhint="next">
             <input class="medfield medD" value="" placeholder="Dose (e.g. 1 tab)" autocapitalize="sentences" enterkeyhint="done">
             <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px"><span style="font-size:12px;color:var(--muted);font-weight:600">Time</span>
               <input class="medfield medT" type="time" value="07:00" style="margin:0;flex:1"></div>
             <div style="display:flex;gap:8px">
               <button class="btn ghost sm medCancel" style="flex:1">Cancel</button>
               <button class="btn leather sm medSave" data-mi="-1" style="flex:1">Add</button>
             </div>
           </div>`
        : `<button class="btn ghost sm" id="medAdd" style="width:100%;margin-top:4px">+ Add medication</button>`}
      ${h.meds.length?'':`<div style="font-size:12px;color:var(--muted);padding:6px 2px 0">No medications yet.</div>`}
      <div class="note" style="margin-top:9px">🥣 ${escapeHtml(h.feed)}</div>
      <div class="foot"><b>ForEver After All Ranch · Office build v0.1</b></div>
    </div>
   </div>
  </div>`;
  $("#exitOwner").onclick=()=>{S.owner=false;S.ownerHorse=null;render();};
  $("#hdBack").onclick=()=>{S.ownerHorse=null;S.opTab="horses";renderOwner();};

  const firstOpenStall=()=>STALLS.find(s=>S.horses.findIndex(x=>x.location==='stall'&&x.stall===s)<0);
  const firstOpenPasture=()=>PASTURES.find(p=>S.horses.filter(x=>x.location==='pasture'&&x.pasture===p).length<PASTURE_CAP);

  const cs=$("#catStall"); if(cs)cs.onclick=()=>{
    if(h.location==='stall')return;
    const open=firstOpenStall();
    if(!open){ toast("All 9 stalls are full"); return; }
    confirmModal(`Bring ${h.name} into a stall?`,`This moves ${h.name} from ${h.pasture} into ${open}. You can pick a different stall after.`,"Move to stall",
      ()=>{ h.location="stall"; h.stall=open; save(); renderHorseDetail(hi); toast(`${h.name} is now in ${open} 🏠`); });
  };
  const cp=$("#catPasture"); if(cp)cp.onclick=()=>{
    if(h.location==='pasture')return;
    const open=firstOpenPasture();
    if(!open){ toast("All pastures are full"); return; }
    confirmModal(`Turn ${h.name} out to pasture?`,`This moves ${h.name} from ${h.stall} out to ${open}. You can pick a different pasture after.`,"Move to pasture",
      ()=>{ h.location="pasture"; h.pasture=open; save(); renderHorseDetail(hi); toast(`${h.name} is now in ${open} 🌿`); });
  };
  shell.querySelectorAll(".stallcell").forEach(c=>c.onclick=()=>{
    const s=c.dataset.stall; if(s===h.stall)return;
    h.stall=s; save(); renderHorseDetail(hi); toast(`${h.name} moved to ${s}`);
  });
  shell.querySelectorAll(".pastrow").forEach(c=>c.onclick=()=>{
    const p=c.dataset.pasture; if(p===h.pasture)return;
    h.pasture=p; save(); renderHorseDetail(hi); toast(`${h.name} moved to ${p}`);
  });
  const ma=$("#medAdd"); if(ma)ma.onclick=()=>{ S.medEdit={hi,mi:-1}; renderHorseDetail(hi); };
  shell.querySelectorAll(".medEditBtn").forEach(b=>b.onclick=()=>{ S.medEdit={hi,mi:+b.dataset.mi}; renderHorseDetail(hi); });
  shell.querySelectorAll(".medCancel").forEach(b=>b.onclick=()=>{ S.medEdit=null; renderHorseDetail(hi); });
  shell.querySelectorAll(".medSave").forEach(b=>b.onclick=()=>{
    const card=b.closest(".card");
    const n=card.querySelector(".medN").value.trim();
    const dose=card.querySelector(".medD").value.trim();
    const time=card.querySelector(".medT").value||"07:00";
    if(!n){ toast("Give the medication a name"); return; }
    const mi=+b.dataset.mi;
    if(mi===-1) h.meds.push({n,dose,time,given:false});
    else { h.meds[mi].n=n; h.meds[mi].dose=dose; h.meds[mi].time=time; }
    S.medEdit=null; save(); renderHorseDetail(hi); toast(mi===-1?`${n} added`:`${n} updated`);
  });
  shell.querySelectorAll(".medDel").forEach(b=>b.onclick=()=>{
    const mi=+b.dataset.mi, nm=h.meds[mi].n;
    confirmModal(`Delete ${nm}?`,`This removes ${nm} from ${h.name}'s medications.`,"Delete",
      ()=>{ h.meds.splice(mi,1); S.medEdit=null; save(); renderHorseDetail(hi); toast(`${nm} deleted`); });
  });
  shell.querySelectorAll(".med .toggle").forEach(sw=>sw.onclick=()=>{
    const m=h.meds[sw.dataset.m]; m.given=!m.given; save(); renderHorseDetail(hi);
    toast(m.given?`${m.n} marked given`:`${m.n} un-marked`);
  });
}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* boot */
render();
</script>
</body>
</html>
